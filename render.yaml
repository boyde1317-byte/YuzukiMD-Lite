services:
  - type: web
    name: yuzuki-md
    runtime: node
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: PHONE_NUMBER
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    # Persistent disk — mounts /app/data (settings.json, database.json, groups.json)
    # The bot session is stored in /app/bot_session; you can add a second disk if needed.
    disk:
      name: yuzuki-data
      mountPath: /app/data
      sizeGB: 1
